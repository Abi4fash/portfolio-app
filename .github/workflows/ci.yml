name: My First Pipeline

on: push

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Build image
        run: |
         docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}} .
         docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio .
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Push image to registry
        run: |
         docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio
         docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH to linux server and run container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.SSH_USERNAME}}
          key: ${{secrets.PRIVATE_KEY}}
          port: ${{secrets.PORT}}
          script: |
            docker rm -f portfolio || echo "container not found, skipping removal"
            docker rmi -f ${{secrets.DOCKER_USERNAME}}/ciportfolio || echo "image not found"
            docker run -d --name portfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/ciportfolio